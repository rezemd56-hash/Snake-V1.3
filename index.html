<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake 2026 - El Juego Clásico Reinventado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --dark: #0f172a;
            --light: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            background: linear-gradient(135deg, var(--dark) 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--light);
            overflow: hidden;
        }

        /* PANTALLA DE PERFIL */
        .profile-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            animation: fadeIn 0.6s ease-in;
            z-index: 100;
            max-width: 600px;
            width: 90%;
            padding: 20px;
        }

        .profile-screen.hidden {
            display: none;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-header h1 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .profile-header p {
            font-size: 1rem;
            color: #94a3b8;
        }

        .profile-form {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .avatar-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(99, 102, 241, 0.2);
            font-size: 3rem;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .upload-btn, .camera-btn {
            padding: 12px 20px;
            border: 2px solid var(--primary);
            background: rgba(99, 102, 241, 0.2);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .upload-btn:hover, .camera-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.9rem;
            color: #cbd5e1;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            padding: 12px 15px;
            background: rgba(15, 23, 42, 0.8);
            border: 1.5px solid rgba(99, 102, 241, 0.4);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        .profile-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--success), var(--primary));
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.3);
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.5);
        }

        .leaderboard-btn {
            background: rgba(99, 102, 241, 0.3);
            border: 2px solid var(--primary);
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .leaderboard-btn:hover {
            background: var(--primary);
            transform: translateY(-3px);
        }

        /* PANTALLA LEADERBOARD */
        .leaderboard-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            animation: slideIn 0.6s ease-out;
            max-width: 700px;
            width: 90%;
            padding: 20px;
        }

        .leaderboard-screen.hidden {
            display: none;
        }

        .leaderboard-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .leaderboard-header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .leaderboard-header p {
            color: #94a3b8;
        }

        .leaderboard-container {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-height: 500px;
            overflow-y: auto;
        }

        .leaderboard-empty {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .leaderboard-entry {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 15px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s ease;
        }

        .leaderboard-entry:hover {
            background: rgba(15, 23, 42, 0.8);
            transform: translateX(5px);
        }

        .leaderboard-entry.current-user {
            border-left-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .rank-number {
            font-size: 1.5rem;
            font-weight: 900;
            width: 40px;
            text-align: center;
            color: var(--accent);
        }

        .rank-number.gold {
            color: #ffd700;
            font-size: 1.8rem;
        }

        .rank-number.silver {
            color: #c0c0c0;
            font-size: 1.8rem;
        }

        .rank-number.bronze {
            color: #cd7f32;
            font-size: 1.8rem;
        }

        .entry-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--primary);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(99, 102, 241, 0.2);
            font-size: 1.5rem;
        }

        .entry-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .entry-info {
            flex: 1;
        }

        .entry-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            margin-bottom: 3px;
        }

        .entry-score {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--accent);
            text-align: right;
        }

        .leaderboard-footer {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* PANTALLA DE INICIO - SELECTOR DE MODO */
        .mode-selector {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            animation: fadeIn 0.6s ease-in;
            z-index: 100;
        }

        .mode-selector.hidden {
            display: none;
        }

        .game-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title h1 {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .game-title p {
            font-size: 1.2rem;
            color: #94a3b8;
            font-weight: 300;
        }

        .user-info-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            margin-bottom: 20px;
        }

        .user-avatar-small {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(99, 102, 241, 0.2);
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .user-avatar-small img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 700;
            font-size: 1rem;
            color: white;
        }

        .user-record {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .change-user-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .change-user-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .mode-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 600px;
            width: 90%;
        }

        .mode-btn {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(236, 72, 153, 0.2) 100%);
            border: 2px solid rgba(99, 102, 241, 0.5);
            border-radius: 20px;
            padding: 40px 30px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            color: var(--light);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .mode-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            transition: left 0.4s ease;
            z-index: -1;
        }

        .mode-btn:hover {
            transform: translateY(-10px);
            border-color: var(--secondary);
            box-shadow: 0 20px 50px rgba(99, 102, 241, 0.4);
        }

        .mode-btn:hover::before {
            left: 0;
        }

        .mode-btn:hover .mode-icon {
            transform: scale(1.2) rotate(10deg);
        }

        .mode-btn:hover .mode-text {
            color: white;
        }

        .mode-icon {
            font-size: 3.5rem;
            transition: transform 0.4s ease;
            filter: drop-shadow(0 5px 15px rgba(99, 102, 241, 0.3));
        }

        .mode-text {
            text-align: center;
            transition: color 0.4s ease;
        }

        .mode-text h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .mode-text p {
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        /* CONTENEDOR PRINCIPAL DEL JUEGO */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            animation: slideIn 0.6s ease-out;
        }

        .game-container.hidden {
            display: none;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
        }

        .score-display {
            text-align: center;
            flex: 1;
        }

        .score-display h3 {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-display .score-value {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .high-score {
            text-align: right;
        }

        .high-score h3 {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .high-score .score-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .game-canvas-wrapper {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.95));
            border-radius: 20px;
            padding: 3px;
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.3);
            border: 1px solid rgba(99, 102, 241, 0.3);
            backdrop-filter: blur(10px);
        }

        canvas {
            display: block;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.8));
        }

        /* CONTROLES MÓVILES */
        .mobile-controls {
            display: none;
            width: 100%;
            max-width: 250px;
            padding: 20px;
        }

        .mobile-controls.active {
            display: grid;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
        }

        .control-btn {
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.3);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-weight: bold;
        }

        .control-btn:active {
            transform: scale(0.85);
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.5);
        }

        .control-btn.up { grid-column: 2; }
        .control-btn.left { grid-column: 1; grid-row: 2; }
        .control-btn.down { grid-column: 2; grid-row: 2; }
        .control-btn.right { grid-column: 3; grid-row: 2; }

        /* MODAL GAME OVER */
        .game-over-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .game-over-modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-over-content {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-radius: 25px;
            padding: 50px 40px;
            text-align: center;
            border: 2px solid rgba(99, 102, 241, 0.5);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
            animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .game-over-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 0.6s ease;
        }

        .game-over-content h2 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--danger), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-over-stats {
            margin: 30px 0;
            padding: 25px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 15px;
            border-left: 4px solid var(--primary);
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .stat-line .label {
